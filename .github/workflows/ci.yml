name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  BUN_VERSION: 1.3.11

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Compile host binary
        run: npm run bun:compile

      - name: Run compiled-binary smoke tests
        run: node --import tsx --test test/compiled-binary.test.ts
